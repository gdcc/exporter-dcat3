########################################
# Aggregate Access Control - Dataset Mapping
#
# Reference: DOCUMENTATION.md section 7 "Real-World Example"
#
# Demonstrates administrator responsibility for correctly
# configuring dataset-level access rights
########################################

### Subject IRI
subject.iri.json = $.datasetJson.datasetVersion.datasetPersistentId

### Title
props.title.predicate = dct:title
props.title.as        = literal
props.title.lang      = en
props.title.json      = $.datasetJson.metadataBlocks.citation.fields[?(@.typeName=='title')].value

### Description
props.description.predicate = dct:description
props.description.as        = literal
props.description.lang      = en
props.description.json      = $.datasetJson.metadataBlocks.citation.fields[?(@.typeName=='dsDescription')].value[0].dsDescriptionValue.value

### Identifier
props.identifier.predicate = dct:identifier
props.identifier.as        = literal
props.identifier.json      = $.datasetJson.datasetVersion.datasetPersistentId

### Access Rights - ADMINISTRATOR RESPONSIBILITY
# The administrator is responsible for correctly setting this.
# In this scenario, if ANY file in the dataset has restricted=true,
# the dataset accessRights should be RESTRICTED.
#
# Configuration options:
# 1. If metadata explicitly provides accessRights ? use it directly (current approach)
# 2. If metadata does NOT provide it ? admin responsibility to ensure it's in metadata
#
# This test demonstrates: the metadata (DCATMetadata.DCATaccessRights)
# is provided by the admin/curator to match the actual access restrictions.
nodes.ar.kind                = iri
nodes.ar.type                = dct:RightsStatement
nodes.ar.iri.json            = $.datasetJson.metadataBlocks.DCATMetadata.fields[?(@.typeName=='DCATaccessRights')].value
nodes.ar.map.public          = http://publications.europa.eu/resource/authority/access-right/PUBLIC
nodes.ar.map.restricted      = http://publications.europa.eu/resource/authority/access-right/RESTRICTED
nodes.ar.map.non-public      = http://publications.europa.eu/resource/authority/access-right/NON_PUBLIC
props.accessRights.predicate = dct:accessRights
props.accessRights.as        = node-ref
props.accessRights.node      = ar

### Landing page
nodes.landing.kind      = iri
nodes.landing.type      = foaf:Document
nodes.landing.iri.json  = $.datasetJson.persistentUrl
props.landing.predicate = dcat:landingPage
props.landing.as        = node-ref
props.landing.node      = landing

### Language
nodes.lang.kind      = iri
nodes.lang.type      = dct:LinguisticSystem
nodes.lang.iri.const = http://publications.europa.eu/resource/authority/language/ENG
props.language.predicate = dct:language
props.language.as        = node-ref
props.language.node      = lang

### Keywords
props.keyword.predicate = dcat:keyword
props.keyword.as        = literal
props.keyword.lang      = en
props.keyword.multi     = true
props.keyword.json      = $.datasetJson.metadataBlocks.citation.fields[?(@.typeName=='keyword')].value[*].keywordValue.value

### Issued
props.issued.predicate = dct:issued
props.issued.as        = literal
props.issued.datatype  = xsd:date
props.issued.json      = $.datasetJson.datasetVersion.publicationDate


