############################################
# Minimal mapping profile to test Issue #41 semantics
# - mapped input -> mapped IRI (control)
# - unmapped input -> onUnMappedValue
# - no input -> onNoInputValue
############################################

# Stable subject for assertions
subject.iri.const = https://example.org/ds/1

# Controlled vocab node (IRI) resolved from input field $.ar
nodes.ar.kind = iri
nodes.ar.type = dct:RightsStatement
nodes.ar.iri.json = $.ar

# Normal mapping table: only "public" is mapped
nodes.ar.map.public = http://publications.europa.eu/resource/authority/access-right/PUBLIC

# Issue #41: explicit fallbacks (not implemented yet in code; test will fail until fixed)
nodes.ar.onUnMappedValue = http://example.org/ar/unmapped
nodes.ar.onNoInputValue  = http://example.org/ar/no-input

# Connect dataset -> accessRights -> node ar
props.accessRights.predicate = dct:accessRights
props.accessRights.as = node-ref
props.accessRights.node = ar