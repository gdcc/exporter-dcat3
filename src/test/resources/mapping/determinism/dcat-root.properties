################################################################################
# Determinism profile: minimal mapping to reproduce issue #40
# Builds only:
#  - dcat:Distribution (scoped over datasetFileDetails[*])
#  - dcat:DataService (one resource at env.apiBaseUrl)
################################################################################

dcat.trace.enabled = false

# Prefixes required by the two element mappings
prefix.dcat = http://www.w3.org/ns/dcat#
prefix.dct  = http://purl.org/dc/terms/
prefix.rdf  = http://www.w3.org/1999/02/22-rdf-syntax-ns#
prefix.rdfs = http://www.w3.org/2000/01/rdf-schema#
prefix.xsd  = http://www.w3.org/2001/XMLSchema#

# Elements (only the two needed for the reproducer)
element.distribution.id = distribution
element.distribution.type = dcat:Distribution
element.distribution.file = dcat-distribution.properties

element.dataservice.id = dataservice
element.dataservice.type = dcat:DataService
element.dataservice.file = dcat-dataservice.properties

# No cross-element relations needed for this reproducer:
# the critical link is Distribution -> dcat:accessService -> DataService