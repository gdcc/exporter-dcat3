############################################
# Determinism Distribution mapping (minimal)
############################################

# Scope: one Distribution per file detail record
scope.json = $.datasetFileDetails[*]

# Subject IRI: {env.apiBaseUrl} + "access/datafile/" + {id}
subject.iri.json.1 = $$.env.apiBaseUrl
subject.iri.json.2 = $.id
subject.iri.format = ${1}access/datafile/${2}

# Title
props.title.predicate = dct:title
props.title.as = literal
props.title.json = $.filename

# Access URL (use same URL as subject)
props.accessURL.predicate = dcat:accessURL
props.accessURL.as = iri
props.accessURL.json.1 = $$.env.apiBaseUrl
props.accessURL.json.2 = $.id
props.accessURL.format = ${1}access/datafile/${2}

# The critical link: every Distribution references the same DataService
nodes.service.kind = iri
nodes.service.type = dcat:DataService
nodes.service.iri.json = $$.env.apiBaseUrl

props.accessService.predicate = dcat:accessService
props.accessService.as = node-ref
props.accessService.node = service