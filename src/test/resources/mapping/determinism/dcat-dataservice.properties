############################################
# Determinism DataService mapping (minimal)
############################################

# Subject IRI: one shared service resource
subject.iri.json = $$.env.apiBaseUrl

# A couple of stable properties
props.title.predicate = dct:title
props.title.as = literal
props.title.lang = en
props.title.const = Dataverse API (determinism test)

props.identifier.predicate = dct:identifier
props.identifier.as = literal
props.identifier.json = $$.env.apiBaseUrl

# Optional: endpoint URL as an IRI (keeps graph slightly richer)
props.endpointUrl.predicate = dcat:endpointURL
props.endpointUrl.as = iri
props.endpointUrl.json = $$.env.apiBaseUrl
