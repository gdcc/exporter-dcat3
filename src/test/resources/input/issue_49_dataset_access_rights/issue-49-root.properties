########################################
# Issue 49: Dataset Access Rights Configuration
#
# APPROACH: The administrator is responsible for correctly
# configuring the dataset-level accessRights.
#
# Given:
# - The dataset has multiple files, some with restricted=true
# - The administrator must ensure dataset accessRights reflects
#   the most restrictive file access level
#
# SOLUTION: Administrator explicitly provides or derives the
# dataset-level accessRights through proper configuration,
# leveraging the existing mapping system (no new DSL required).
########################################

# Root Configuration
trace.enabled = false

# Prefixes
prefix.dcat   = http://www.w3.org/ns/dcat#
prefix.dct    = http://purl.org/dc/terms/
prefix.foaf   = http://xmlns.com/foaf/0.1/
prefix.vcard  = http://www.w3.org/2006/vcard/ns#
prefix.skos   = http://www.w3.org/2004/02/skos/core#
prefix.rdfs   = http://www.w3.org/2000/01/rdf-schema#
prefix.xsd    = http://www.w3.org/2001/XMLSchema#
prefix.spdx   = http://spdx.org/rdf/terms#

# Elements
element.dataset.id    = dataset
element.dataset.type  = dcat:Dataset
element.dataset.file  = issue-49-dataset.properties

element.distribution.id   = distribution
element.distribution.type = dcat:Distribution
element.distribution.file = issue-49-distribution.properties

# Relations
relation.dataset_has_distribution.subject     = dataset
relation.dataset_has_distribution.predicate   = dcat:distribution
relation.dataset_has_distribution.object      = distribution
relation.dataset_has_distribution.cardinality = 0..n

